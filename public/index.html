<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RiddleCreator — Launch on XRPL</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --ink:#0a0a0a; --cream:#f2ecdf; --dim:#8d8676; --line:#2a2a26; --up:#9fd98a; --down:#e08a7a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--ink); color:var(--cream); font-family:'Space Mono',monospace; min-height:100vh; }
  header { display:flex; justify-content:space-between; align-items:baseline; padding:28px 32px; border-bottom:1px solid var(--line); }
  header h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:22px; letter-spacing:-.5px; }
  header h1 span { color:var(--dim); }
  header .net { font-size:11px; color:var(--dim); text-transform:uppercase; }
  main { max-width:1080px; margin:0 auto; padding:40px 24px 80px; }
  h2 { font-family:'Syne',sans-serif; font-weight:700; font-size:15px; text-transform:uppercase; letter-spacing:2px; margin-bottom:18px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-bottom:56px; }
  .card { border:1px solid var(--line); padding:18px; cursor:pointer; transition:border-color .15s; }
  .card:hover, .card:focus-visible { border-color:var(--cream); outline:none; }
  .card .tick { font-family:'Syne',sans-serif; font-weight:700; font-size:20px; }
  .card .name { color:var(--dim); font-size:12px; margin-bottom:12px; }
  .stat { display:flex; justify-content:space-between; font-size:12px; padding:3px 0; }
  .stat b { font-weight:400; }
  .bar { height:4px; background:var(--line); margin-top:12px; }
  .bar i { display:block; height:100%; background:var(--cream); }
  .grad { font-size:11px; color:var(--up); margin-top:8px; }
  form, .panel { border:1px solid var(--line); padding:24px; margin-bottom:56px; }
  label { display:block; font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin:14px 0 6px; }
  input, textarea { width:100%; background:transparent; border:1px solid var(--line); color:var(--cream); font-family:'Space Mono',monospace; font-size:14px; padding:10px 12px; }
  input:focus, textarea:focus { outline:none; border-color:var(--cream); }
  button { background:var(--cream); color:var(--ink); border:none; font-family:'Space Mono',monospace; font-weight:700; font-size:13px; padding:12px 22px; cursor:pointer; margin-top:18px; }
  button:disabled { opacity:.4; cursor:wait; }
  button.ghost { background:transparent; color:var(--cream); border:1px solid var(--line); }
  .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  #detail { display:none; }
  .back { color:var(--dim); font-size:12px; cursor:pointer; margin-bottom:20px; display:inline-block; }
  .tabs { display:flex; margin:20px 0 0; }
  .tabs button { flex:1; margin:0; }
  .tabs .off { background:transparent; color:var(--dim); border:1px solid var(--line); }
  .msg { font-size:12px; margin-top:14px; white-space:pre-wrap; word-break:break-all; }
  .msg.ok { color:var(--up); } .msg.err { color:var(--down); }
  .trades { font-size:11px; margin-top:24px; }
  .trades div { display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--line); color:var(--dim); }
  .trades .b { color:var(--up); } .trades .s { color:var(--down); }
  .mono-sm { font-size:11px; color:var(--dim); word-break:break-all; line-height:1.7; }
  .invoice { border:1px dashed var(--line); padding:16px; margin-top:16px; font-size:12px; line-height:1.8; }
  .qr { background:#fff; padding:8px; width:180px; margin-top:12px; }
  .qr img { display:block; width:164px; }
  a { color:var(--cream); }
  @media (max-width:600px){ .row{grid-template-columns:1fr} }
</style>
</head>
<body>
<header>
  <h1>RIDDLE<span>CREATOR</span></h1>
  <div class="net" id="netBadge">…</div>
</header>
<main>
  <section id="home">
    <h2>Launch a token</h2>
    <form id="launchForm">
      <div class="row">
        <div><label>Name</label><input id="fName" placeholder="Riddle Coin" maxlength="64" required></div>
        <div><label>Ticker</label><input id="fTicker" placeholder="RDL" maxlength="12" required></div>
      </div>
      <label>Description</label><textarea id="fDesc" rows="2" maxlength="280" placeholder="What's the riddle?"></textarea>
      <label>Creator address (fees paid here on every trade)</label>
      <input id="fCreator" placeholder="r..." required>
      <button id="launchBtn">Get launch invoice</button>
      <div id="invoiceBox"></div>
      <div id="launchMsg" class="msg"></div>
    </form>

    <h2>Live curves</h2>
    <div class="grid" id="tokenGrid"></div>
  </section>

  <section id="detail">
    <span class="back" onclick="showHome()">← All tokens</span>
    <div class="panel">
      <div style="font-family:'Syne';font-weight:800;font-size:28px" id="dTicker"></div>
      <div style="color:var(--dim);font-size:13px;margin:4px 0 18px" id="dName"></div>
      <div class="stat"><span>Price</span><b id="dPrice"></b></div>
      <div class="stat"><span>Market cap</span><b id="dMcap"></b></div>
      <div class="stat"><span>Raised</span><b id="dRaised"></b></div>
      <div class="stat"><span>Creator fees earned</span><b id="dCreatorFees"></b></div>
      <div class="bar"><i id="dBar" style="width:0%"></i></div>
      <div class="grad" id="dGrad"></div>
      <div class="mono-sm" style="margin-top:14px" id="dAddrs"></div>

      <div class="tabs">
        <button id="tabBuy" onclick="setSide('buy')">BUY</button>
        <button id="tabSell" class="off" onclick="setSide('sell')">SELL</button>
      </div>
      <label id="amtLabel">Amount (XRP to spend)</label>
      <input id="tAmount" type="number" step="any" min="0" placeholder="100">
      <div class="mono-sm" id="tQuote" style="margin-top:8px"></div>
      <label>Max slippage %</label>
      <input id="tSlip" type="number" step="any" min="0" value="2">

      <button id="xamanBtn" onclick="tradeXaman()" style="display:none">Sign with Xaman</button>
      <div id="xamanBox"></div>

      <div class="mono-sm" style="margin-top:20px" id="manualHelp"></div>
      <label>Or paste your payment tx hash</label>
      <input id="tHash" placeholder="Transaction hash of your payment to the curve wallet">
      <button class="ghost" onclick="tradeHash()">Submit trade</button>

      <div id="tradeMsg" class="msg"></div>
      <div class="trades" id="dTrades"></div>
    </div>
  </section>
</main>
<script>
const api = (p, o) => fetch('/api'+p, o ? {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)} : {}).then(r=>r.json());
let META = null, current = null, side = 'buy', lastQuote = null, pollTimer = null;

async function init(){
  META = await api('/meta');
  netBadge.textContent = 'XRPL ' + META.network + (META.xamanEnabled ? ' · Xaman' : '');
  launchBtn.textContent = 'Get launch invoice — ' + META.launchFeeXrp + ' XRP';
  loadTokens();
}

async function loadTokens(){
  const toks = await api('/tokens');
  tokenGrid.innerHTML = toks.length ? '' : '<div class="mono-sm">No tokens yet. Launch the first one above.</div>';
  toks.forEach(t=>{
    const d = document.createElement('div');
    d.className='card'; d.tabIndex=0;
    d.innerHTML = `<div class="tick">$${t.ticker}</div><div class="name">${esc(t.name)}</div>
      <div class="stat"><span>MC</span><b>${t.marketCapXrp.toFixed(0)} XRP</b></div>
      <div class="stat"><span>Raised</span><b>${t.raisedXrp.toFixed(1)} / ${t.config.GRADUATION_XRP} XRP</b></div>
      <div class="bar"><i style="width:${t.progress}%"></i></div>
      ${t.graduated?'<div class="grad">GRADUATED → AMM</div>':''}`;
    d.onclick = ()=>openToken(t.id);
    tokenGrid.appendChild(d);
  });
}
const esc = (s)=>String(s||'').replace(/[<>&"]/g, c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]));

async function openToken(id){
  current = await api('/tokens/'+id);
  home.style.display='none'; detail.style.display='block';
  xamanBtn.style.display = META.xamanEnabled ? 'block' : 'none';
  render();
}
function showHome(){ detail.style.display='none'; home.style.display='block'; clearInterval(pollTimer); loadTokens(); }

function render(){
  const t = current;
  dTicker.textContent = '$'+t.ticker;
  dName.textContent = t.name + (t.description ? ' — '+t.description : '');
  dPrice.textContent = t.price.toExponential(4)+' XRP';
  dMcap.textContent = t.marketCapXrp.toFixed(0)+' XRP';
  dRaised.textContent = t.raisedXrp.toFixed(2)+' / '+t.config.GRADUATION_XRP+' XRP';
  dCreatorFees.textContent = t.creatorFeesXrp.toFixed(4)+' XRP';
  dBar.style.width = t.progress+'%';
  dGrad.textContent = t.graduated ? 'GRADUATED — liquidity on XRPL native AMM, issuer blackholed' : t.progress.toFixed(1)+'% to graduation';
  dAddrs.innerHTML = 'Issuer: '+t.issuerAddress+'<br>Curve wallet: '+t.curveAddress+'<br>Currency code: '+t.currency;
  manualHelp.innerHTML = side==='buy'
    ? 'Manual: set a trustline to the issuer, send XRP from your wallet to the curve wallet above, paste the tx hash.'
    : 'Manual: send $'+t.ticker+' tokens from your wallet to the curve wallet above, paste the tx hash.';
  dTrades.innerHTML = '<h2 style="margin:20px 0 10px">Trades</h2>' + t.trades.map(tr=>
    `<div><span class="${tr.side==='buy'?'b':'s'}">${tr.side.toUpperCase()}</span><span>${Number(tr.tokens).toFixed(0)} tok</span><span>${Number(tr.xrp).toFixed(2)} XRP</span><span>${new Date(tr.ts).toLocaleTimeString()}</span></div>`).join('');
}

function setSide(s){
  side = s;
  tabBuy.className = s==='buy' ? '' : 'off';
  tabSell.className = s==='sell' ? '' : 'off';
  amtLabel.textContent = s==='buy' ? 'Amount (XRP to spend)' : 'Amount (tokens to sell)';
  tQuote.textContent=''; lastQuote=null; render();
}

tAmount.addEventListener('input', async ()=>{
  if(!current || !tAmount.value){ tQuote.textContent=''; lastQuote=null; return; }
  const q = await api('/tokens/'+current.id+'/quote', {side, amount:Number(tAmount.value)});
  if(q.error){ tQuote.textContent=q.error; lastQuote=null; return; }
  lastQuote = q;
  tQuote.textContent = side==='buy'
    ? `≈ ${q.tokensOut.toFixed(0)} tokens · creator fee ${q.creator.toFixed(4)} · platform ${q.platform.toFixed(4)} XRP`
    : `≈ ${q.xrpOut.toFixed(4)} XRP · creator fee ${q.creator.toFixed(4)} · platform ${q.platform.toFixed(4)} XRP`;
});

function minOut(){
  if(!lastQuote) return undefined;
  const slip = Number(tSlip.value||0)/100;
  return side==='buy' ? lastQuote.tokensOut*(1-slip) : lastQuote.xrpOut*(1-slip);
}

async function tradeXaman(){
  if(!current || !tAmount.value) return;
  xamanBtn.disabled = true; tradeMsg.className='msg'; tradeMsg.textContent='Creating Xaman sign request…';
  const p = await api('/tokens/'+current.id+'/xaman/payload', {side, amount:Number(tAmount.value)});
  xamanBtn.disabled = false;
  if(p.error){ tradeMsg.className='msg err'; tradeMsg.textContent=p.error; return; }
  xamanBox.innerHTML = `<div class="invoice">Scan in Xaman or <a href="${p.deeplink}" target="_blank" rel="noopener">open sign request</a><div class="qr"><img src="${p.qrPng}" alt="Xaman QR"></div></div>`;
  tradeMsg.textContent = 'Waiting for signature…';
  const mo = minOut();
  clearInterval(pollTimer);
  pollTimer = setInterval(async ()=>{
    const r = await api('/tokens/'+current.id+'/xaman/confirm', {uuid:p.uuid, minOut:mo});
    if(r.pending) return;
    clearInterval(pollTimer); xamanBox.innerHTML='';
    if(r.rejected){ tradeMsg.className='msg err'; tradeMsg.textContent='Sign request declined.'; return; }
    if(r.error){ tradeMsg.className='msg err'; tradeMsg.textContent=r.error; return; }
    showResult(r);
  }, 3000);
}

async function tradeHash(){
  if(!current || !tHash.value.trim()) return;
  tradeMsg.className='msg'; tradeMsg.textContent='Verifying payment on ledger…';
  const r = await api('/tokens/'+current.id+'/trade', {paymentTxHash:tHash.value.trim(), minOut:minOut()});
  if(r.error){ tradeMsg.className='msg err'; tradeMsg.textContent=r.error; return; }
  showResult(r);
}

async function showResult(r){
  tradeMsg.className='msg ok';
  tradeMsg.textContent = r.side==='buy'
    ? `Bought ${r.tokensOut.toFixed(0)} tokens · creator paid ${r.creatorFee.toFixed(4)} XRP · tx ${r.settleTx}${r.graduated?'\nTOKEN GRADUATED → AMM CREATED':''}`
    : `Sold for ${r.xrpOut.toFixed(4)} XRP · creator paid ${r.creatorFee.toFixed(4)} XRP · tx ${r.settleTx}`;
  await openToken(current.id);
}

// ---- launch flow: invoice -> pay -> confirm ----
let currentLaunch = null;
launchForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  launchBtn.disabled = true; launchMsg.className='msg'; launchMsg.textContent='';
  const r = await api('/launch/invoice', {name:fName.value, ticker:fTicker.value, description:fDesc.value, creatorAddress:fCreator.value.trim()});
  launchBtn.disabled = false;
  if(r.error){ launchMsg.className='msg err'; launchMsg.textContent=r.error; return; }
  currentLaunch = r;
  invoiceBox.innerHTML = `<div class="invoice">
    <b>Launch invoice</b><br>
    Send <b>${r.pay.amountXrp} XRP</b> to:<br>${r.pay.address}<br>
    Destination tag: <b>${r.pay.destinationTag}</b> (required)<br>
    <label>Payment tx hash</label><input id="launchHash" placeholder="Paste the tx hash of your fee payment">
    <button type="button" onclick="confirmLaunch()">Confirm payment &amp; launch</button>
  </div>`;
});

async function confirmLaunch(){
  const h = document.getElementById('launchHash').value.trim();
  if(!h) return;
  launchMsg.className='msg'; launchMsg.textContent='Verifying payment, funding wallets, minting supply… (~30–60s)';
  const r = await api('/launch/'+currentLaunch.launchId+'/confirm', {paymentTxHash:h});
  if(r.error){ launchMsg.className='msg err'; launchMsg.textContent=r.error; return; }
  launchMsg.className='msg ok'; launchMsg.textContent='Token is live!';
  invoiceBox.innerHTML=''; loadTokens();
}

init();
setInterval(()=>{ if(home.style.display!=='none') loadTokens(); }, 10000);
</script>
</body>
</html>
